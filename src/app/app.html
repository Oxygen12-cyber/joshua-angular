<div class="min-h-screen bg-white text-gray-900 font-sans flex flex-col">
  <nav class="border-b border-gray-100 sticky top-0 bg-white z-10 w-full py-5 px-6">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a routerLink="/" class="text-2xl font-bold tracking-tight">Joshua<span class="text-blue-600">.</span></a>
      <div class="flex gap-3 md:gap-8">
        <a routerLink="/" routerLinkActive="text-gray-900 font-semibold" [routerLinkActiveOptions]="{exact: true}" class="text-gray-500 hover:text-gray-900 transition-colors">Home</a>
        <a routerLink="/projects" routerLinkActive="text-gray-900 font-semibold" class="text-gray-500 hover:text-gray-900 transition-colors">Work</a>
        <a routerLink="/contact" routerLinkActive="text-gray-900 font-semibold" class="text-gray-500 hover:text-gray-900 transition-colors">Contact</a>
      </div>
    </div>
  </nav>

  <main class="flex-grow">
    <router-outlet></router-outlet>
  </main>
  
  <footer class="border-t border-gray-100 py-8 px-6 text-center text-gray-500 text-sm">
    <p>&copy; 2026 Joshua. Built with Angular & Tailwind CSS.</p>
  </footer>
</div>
